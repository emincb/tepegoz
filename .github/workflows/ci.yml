name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test on ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  cross-build:
    name: Build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: mlugg/setup-zig@v1
        with:
          version: 0.13.0
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - run: cargo zigbuild --workspace --target ${{ matrix.target }}

  # Cheap sanity gate against controller `build.rs` drift vs. the actual
  # agent build: runs `cargo xtask build-agents` to populate
  # `target/agents/<triple>/{tepegoz-agent, manifest.json}` for all four
  # Decision #3 triples, then `cargo check -p tepegoz` to force the
  # controller's `build.rs` to consume each manifest + assert
  # `protocol_version` matches `tepegoz-proto/PROTOCOL_VERSION` at
  # compile time. Mismatch = panic = CI red. No artifacts shipped —
  # this job catches drift, release packaging lives in Phase 10.
  #
  # Runs on macos-latest because cargo-zigbuild cross-compiling from
  # Linux → darwin fails to link (needs CoreFoundation/IOKit/libobjc
  # frameworks that live in the macOS SDK, which isn't on ubuntu
  # runners). macos-latest runners ship with Xcode SDK + can also
  # cross-compile to Linux musl via zigbuild, so all four triples work
  # from one runner.
  agents:
    name: Agents — cross-compile + drift check
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl,aarch64-unknown-linux-musl,x86_64-apple-darwin,aarch64-apple-darwin
      - uses: mlugg/setup-zig@v1
        with:
          version: 0.13.0
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild
      - uses: Swatinem/rust-cache@v2
        with:
          key: agents
      - name: Cross-compile all agent targets + write manifests
        run: cargo xtask build-agents
      - name: Verify embedded-agent drift check (controller build.rs)
        run: cargo check -p tepegoz
